name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify plugin version matches tag
        run: |
          plugin_version=$(grep -oP 'version="\K[^"]+' godot-client/addons/SpacetimeDB/plugin.cfg)
          if [ "$plugin_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::plugin.cfg version ($plugin_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Package addon
        run: |
          cd godot-client
          zip -r "../SpacetimeDB-SDK-${{ steps.version.outputs.version }}.zip" addons/

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          version="${{ steps.version.outputs.version }}"
          changelog=$(awk "/^## \[${version}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$changelog" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: SpacetimeDB-SDK-${{ steps.version.outputs.version }}.zip
          generate_release_notes: false
